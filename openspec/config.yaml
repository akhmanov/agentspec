schema: spec-driven

context: |
  Repository: agentspec
  Product boundary: agentspec is a declarative workspace sync tool, not a workflow runtime.
  Primary references:
    - SPEC.md
    - ARCH.md
  Validation remains explicit through OpenSpec validation and the repo test suite.

rules:
  proposal:
    - Explain the user or operator value and the intended scope.
    - Avoid implementation detail; put technical choices in design.md.
  specs:
    - Describe externally visible behavior only.
    - Keep scenarios concrete and testable.
  design:
    - Explain decisions, trade-offs, boundaries touched, and relevant rejected alternatives.
  tasks:
    - tasks.md is the task-state source of truth in this repo.
    - Keep tasks dependency-ordered, session-sized, and directly verifiable.
